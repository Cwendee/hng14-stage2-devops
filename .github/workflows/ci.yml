name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

              - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: |
          pip install flake8

      - name: Lint Python
        run: |
          flake8 api worker