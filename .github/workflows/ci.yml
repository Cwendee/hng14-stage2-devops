name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Python Setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx flake8

      # -------------------------
      # Lint (Python)
      # -------------------------
      - name: Lint Python
        run: |
          flake8 api worker

      # -------------------------
      # Test (pytest)
      # -------------------------
      - name: Run API tests
        run: |
          cd api
          PYTHONPATH=. pytest --maxfail=1 --disable-warnings -q

      # -------------------------
      # Node.js + ESLint
      # -------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: |
          cd frontend
          npm install eslint

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      # -------------------------
      # Dockerfile Lint (Hadolint)
      # -------------------------
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3008

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3008

      # -------------------------
      # BUILD STAGE (Docker)
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker

      - name: Push API image
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      # -------------------------
      # SECURITY SCAN (Trivy)
      # -------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL localhost:5000/api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL localhost:5000/worker:${{ github.sha }}