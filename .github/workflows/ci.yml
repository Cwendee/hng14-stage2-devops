name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r api/requirements.txt
          pip install flake8 pytest httpx pytest-cov

      - name: Lint
        run: flake8 api worker

      - name: Run tests with coverage
        run: |
          cd api
          PYTHONPATH=. pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml

      - name: Hadolint API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3008

      - name: Hadolint Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3008

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy scan
        run: |
          trivy image --format sarif -o results.sarif api:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait API
        run: |
          for i in {1..20}; do
            curl -s http://localhost:8000/docs && break
            sleep 3
          done

      - name: Test flow
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r '.job_id')
          sleep 5
          STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')
          test "$STATUS" = "completed"

      - name: Shutdown
        if: always()
        run: docker compose down

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          docker compose up -d --no-deps --build api
          docker compose up -d --no-deps --build worker