name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------
      # Python Setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # Install ALL dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx flake8

      # -------------------------
      # LINT (Python)
      # -------------------------
      - name: Lint Python
        run: |
          flake8 api worker

      # -------------------------
      # TEST (pytest)
      # -------------------------
      - name: Run API tests
        run: |
          cd api
          pytest --maxfail=1 --disable-warnings -q

      # -------------------------
      # Node.js + ESLint
      # -------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: |
          cd frontend
          npm install eslint

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      # -------------------------
      # Dockerfile Lint (Hadolint)
      # -------------------------
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3008

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3008